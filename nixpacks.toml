# Coolify / Nixpacks: evita nginx "duplicate location /" y arranca nginx + php-fpm + colas.
# Docs: https://coolify.io/docs/applications/laravel
# Ejemplo upstream: https://github.com/coollabsio/coolify-examples/tree/main/laravel

[phases.setup]
nixPkgs = ["...", "python311Packages.supervisor"]

[phases.build]
cmds = [
    "chmod +x /assets/start.sh",
    "mkdir -p /var/log/supervisor /var/log/nginx /var/log/php-fpm",
    "touch /var/log/nginx-access.log /var/log/nginx-error.log",
    "...",
]

[start]
cmd = '/assets/start.sh'

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e

# Transform the nginx configuration
node /assets/scripts/prestart.mjs /assets/nginx.template.conf /assets/nginx.conf

# Enable the Laravel queue worker only for async drivers.
# By default this app deploys with sync queues, so avoid a crash/restart loop
# when Supervisor starts a worker that is not needed.
QUEUE_DRIVER="${QUEUE_CONNECTION:-sync}"
QUEUE_WORKER_ENABLED="${ENABLE_QUEUE_WORKER:-}"

if [ -z "$QUEUE_WORKER_ENABLED" ]; then
  case "$QUEUE_DRIVER" in
    sync|null|"")
      QUEUE_WORKER_ENABLED="false"
      ;;
    *)
      QUEUE_WORKER_ENABLED="true"
      ;;
  esac
fi

if [ "$QUEUE_WORKER_ENABLED" != "true" ]; then
  rm -f /assets/worker-laravel.conf
fi

# Start supervisor
supervisord -c /assets/supervisord.conf -n
'''

"scripts/prestart.mjs" = '''
import fs from 'fs';

const [,, templatePath, outputPath] = process.argv;

let template = fs.readFileSync(templatePath, 'utf8');

const variables = {
  ...process.env,
};

// Replace ${VAR}
template = template.replace(/\$\{(\w+)\}/g, (match, name) => {
  return variables[name] || '';
});

// Handle $if($CONDITION) ( $TRUE ) else ( $FALSE )
template = template.replace(/\$if\((\w+)\)\s*\(([\s\S]*?)\)\s*else\s*\(([\s\S]*?)\)/g, (match, condition, truePart, falsePart) => {
  return variables[condition] ? truePart.trim() : falsePart.trim();
});

// Fix potential missing $!{nginx} expansion if it survived
// We try to find where nginx config is usually located in Nixpacks or use relative paths
template = template.replace(/\$!\{nginx\}/g, '/etc/nginx'); 

fs.writeFileSync(outputPath, template);
'''

"supervisord.conf" = '''
[unix_http_server]
file=/assets/supervisor.sock

[supervisord]
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
pidfile=/assets/supervisord.pid
nodaemon=false
silent=false
minfds=1024
minprocs=200

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///assets/supervisor.sock

[include]
files = /assets/worker-*.conf
'''

"worker-nginx.conf" = '''
[program:worker-nginx]
process_name=%(program_name)s_%(process_num)02d
command=nginx -c /assets/nginx.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-nginx.log
stderr_logfile=/var/log/worker-nginx.log
'''

"worker-phpfpm.conf" = '''
[program:worker-phpfpm]
process_name=%(program_name)s_%(process_num)02d
command=php-fpm -y /assets/php-fpm.conf -F -R
autostart=true
autorestart=true
stdout_logfile=/var/log/worker-phpfpm.log
stderr_logfile=/var/log/worker-phpfpm.log
'''

"worker-laravel.conf" = '''
[program:worker-laravel]
process_name=%(program_name)s_%(process_num)02d
directory=/app
command=bash -lc 'exec php artisan queue:work --sleep=3 --tries=3 --max-time=3600'
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
numprocs=1
startsecs=0
stopwaitsecs=3600
stdout_logfile=/var/log/worker-laravel.log
stderr_logfile=/var/log/worker-laravel.log
'''

"php-fpm.conf" = '''
[global]
daemonize = no
error_log = /var/log/php-fpm/error.log

[www]
listen = 127.0.0.1:9000
user = root
group = root
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 4
pm.max_spare_servers = 32
pm.start_servers = 18
clear_env = no
php_admin_value[post_max_size] = 35M
php_admin_value[upload_max_filesize] = 30M
'''

"nginx.template.conf" = '''
user root;
worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
 worker_connections 4096;
}

http {
 include mime.types;
 include /etc/nginx/mime.types;
 index index.html index.htm index.php;

 default_type application/octet-stream;
 log_format main '$remote_addr - $remote_user [$time_local] $status '
 '"$request" $body_bytes_sent "$http_referer" '
 '"$http_user_agent" "$http_x_forwarded_for"';
 access_log /var/log/nginx-access.log;
 error_log /var/log/nginx-error.log;
 sendfile on;
 tcp_nopush on;
 server_names_hash_bucket_size 128;

 server {
 listen ${PORT};
 listen [::]:${PORT};
 server_name localhost;

 root /app/public;

 add_header X-Content-Type-Options "nosniff";

 client_max_body_size 35M;

 index index.php;

 charset utf-8;

 location / {
 try_files $uri $uri/ /index.php?$query_string;
 }

 location = /favicon.ico { access_log off; log_not_found off; }
 location = /robots.txt { access_log off; log_not_found off; }

 error_page 404 /index.php;

 location ~ \.php$ {
 fastcgi_pass 127.0.0.1:9000;
 fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
 include fastcgi_params;
 include fastcgi.conf;
 }

 location ~ /\.(?!well-known).* {
 deny all;
 }
 }
}
'''
